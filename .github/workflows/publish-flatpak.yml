name: publish-flatpak

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: "Build Flatpak"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Set source tag in manifest
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          sed -i "s/tag: v[0-9][0-9.]*$/tag: ${TAG}/" io.github.subsoundorg.Subsound.yml
          sed -i "s/-Pversion=[0-9][0-9.]*/-Pversion=${VERSION}/" io.github.subsoundorg.Subsound.yml
          echo "=== tag and version in manifest ==="
          grep "tag:" io.github.subsoundorg.Subsound.yml
          grep "Pversion" io.github.subsoundorg.Subsound.yml

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: io.github.subsoundorg.Subsound.flatpak
          manifest-path: io.github.subsoundorg.Subsound.yml
          run-tests: false

      # Generate static deltas so updates only download changed objects
      - name: Add static deltas
        run: flatpak build-update-repo repo --generate-static-deltas

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo/

  publish:
    name: "Publish to GitHub Pages"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: flatpak-repo
          path: repo/

      # Push the OSTree repo directory to the hosting GitHub repo.
      # clean: false is critical — OSTree is append-only; deleting old objects
      # breaks existing installations mid-update.
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          repository-name: subsoundorg/subsound-gtk-repo
          ssh-key: ${{ secrets.FLATPAK_REPO_DEPLOY_KEY }}
          branch: main
          folder: repo
          clean: false