id: io.github.subsoundorg.Subsound
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk25
command: Subsound
finish-args:
  - "--env=JAVA_HOME=/app/jre"
  - "--env=JAVA_LOG_LEVEL=WARN"
  - "--socket=pulseaudio"
  - "--socket=wayland"
  - "--socket=fallback-x11"
  - "--device=dri"
  - "--share=ipc"
  - "--share=network"
  - "--own-name=org.mpris.MediaPlayer2.Subsound"
modules:
  - name: openjdk
    buildsystem: 'simple'
    build-commands:
      - "/usr/lib/sdk/openjdk25/install.sh"
  - name: Subsound
    buildsystem: simple
    build-options:
      append-path: "/usr/lib/sdk/openjdk25/gradle/bin:/usr/lib/sdk/openjdk25/jvm/openjdk-25/bin"
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk25/jvm/openjdk-25
    build-commands:
      - gradle -v
      - gradle --offline -Pversion=0.0.0 build
      - install -Dm644 build/libs/Subsound-0.0.0-final.jar /app/lib/Subsound.jar
      - install -Dm755 src/main/resources/app/Subsound.sh /app/bin/Subsound
      # install icons and desktop files:
      - install --mode=0644 -D src/main/resources/icons/icon.svg /app/share/icons/hicolor/scalable/apps/io.github.subsoundorg.Subsound.svg
      - install --mode=0644 -D src/main/resources/icons/hicolor/scalable/status/checkmark-circle-symbolic.svg -t /app/share/icons/hicolor/scalable/status/
      - install --mode=0644 -D src/main/resources/app/io.github.subsoundorg.Subsound.desktop  -t /app/share/applications/
      - install --mode=0644 -D src/main/resources/app/io.github.subsoundorg.Subsound.metainfo.xml -t /app/share/metainfo/
    only-arches:
      - x86_64
    sources:
#      - type: dir
#        path: .
      - type: git
        url: https://github.com/subsoundorg/subsound-gtk
        tag: v0.6.8
      # Include app flatpak-sources.json, generated by Gradle task flatpakGradleGenerator
      - 'flatpak-sources.json'






